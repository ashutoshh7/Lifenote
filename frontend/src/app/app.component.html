<div class="app-layout" [class.sidebar-collapsed]="layoutService.sidebarCollapsed()">
  <!-- Desktop Sidebar -->
  <app-desktop-sidebar class="desktop-only" *ngIf="showLayout()"></app-desktop-sidebar>

  <!-- Main area: header + content -->
  <div class="app-main" [class.auth-page]="!authService.isAuthenticated()">
    <!-- Top Header (desktop only) -->
    <app-header class="desktop-only" *ngIf="showLayout()"></app-header>

    <!-- Page Content -->
    <main #mainContent class="main-content" [ngClass]="{ 'no-padding': !authService.isAuthenticated() }">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Mobile Bottom Nav -->
  <app-mobile-bottom-nav class="mobile-only" *ngIf="showLayout()"></app-mobile-bottom-nav>
</div>
