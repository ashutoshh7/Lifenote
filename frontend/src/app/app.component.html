<div class="app-layout" [class.sidebar-collapsed]="layoutService.sidebarCollapsed()">
  <!-- Desktop Sidebar -->
  @if (showLayout()) {
    <app-desktop-sidebar class="desktop-only"></app-desktop-sidebar>
  }

  <!-- Main area: header + content -->
  <div class="app-main" [class.auth-page]="!authService.isAuthenticated()">
    <!-- Top Header (desktop only) -->
    @if (showLayout()) {
      <app-header class="desktop-only"></app-header>
    }

    <!-- Page Content -->
    <main #mainContent class="main-content" [ngClass]="{ 'no-padding': !authService.isAuthenticated() }">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Mobile Bottom Nav -->
  @if (showLayout()) {
    <app-mobile-bottom-nav class="mobile-only"></app-mobile-bottom-nav>
  }
</div>

<!-- Global Toasts -->
@if (toastService.toasts().length > 0) {
  <div class="toast-container">
    @for (toast of toastService.toasts(); track toast) {
      <div class="toast" [class]="toast.type">
        <span class="material-symbols-outlined icon">
          {{ toast.type === 'success' ? 'check_circle' : 'error' }}
        </span>
        <span class="message">{{ toast.message }}</span>
      </div>
    }
  </div>
}
