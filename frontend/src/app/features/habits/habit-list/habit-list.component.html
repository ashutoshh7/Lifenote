<!--
  HabitListComponent — premium redesign
  Sections: progress banner → skeleton / grid / empty state
  Uses @if / @for (Angular 17+ control flow), no *ngIf/*ngFor.
  Note: kept *ngIf/*ngFor for backwards compat if version < 17;
        switch to @if/@for after confirming Angular version.
-->
<div class="hl">

  <!-- ───── Today's progress banner ───── -->
  <section class="hl__progress" aria-label="Today's habit progress">
    <div class="hl__progress-header">
      <lucide-icon [img]="TrophyIcon" [size]="18" class="hl__progress-icon" aria-hidden="true"></lucide-icon>
      <span class="hl__progress-label">Today's progress</span>
      <span class="hl__progress-pct" *ngIf="totalHabits > 0" aria-live="polite">
        {{ completionPercentage | number:'1.0-0' }}%
      </span>
    </div>

    <div class="hl__progress-row">
      <span class="hl__progress-count" aria-live="polite">
        {{ completedToday }}<span class="hl__progress-divider">/</span>{{ totalHabits }}
        <span class="hl__progress-sublabel">completed</span>
      </span>
    </div>

    <div class="hl__progress-track" role="progressbar"
      [attr.aria-valuenow]="completionPercentage"
      aria-valuemin="0" aria-valuemax="100"
      *ngIf="totalHabits > 0"
    >
      <div class="hl__progress-fill" [style.width.%]="completionPercentage"></div>
    </div>
  </section>

  <!-- ───── Skeleton loading state ───── -->
  <div *ngIf="loading" class="hl__grid" aria-busy="true" aria-label="Loading habits">
    <div class="hl__skeleton-card" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="hl__skeleton-bar"></div>
      <div class="hl__skeleton-body">
        <div class="hl__skeleton-line hl__skeleton-line--title"></div>
        <div class="hl__skeleton-line hl__skeleton-line--meta"></div>
        <div class="hl__skeleton-line hl__skeleton-line--action"></div>
      </div>
    </div>
  </div>

  <!-- ───── Habits grid ───── -->
  <div
    *ngIf="!loading && habits.length > 0"
    class="hl__grid"
    role="list"
    aria-label="Your habits"
  >
    <app-habit-card
      *ngFor="let habit of habits; trackBy: trackByHabitId"
      [habit]="habit"
      (checkIn)="onCheckIn($event)"
      (edit)="onEditHabit($event)"
      (viewStats)="onViewStats($event)"
      role="listitem"
    ></app-habit-card>
  </div>

  <!-- ───── Empty state ───── -->
  <div *ngIf="!loading && habits.length === 0" class="hl__empty" role="status">
    <div class="hl__empty-icon" aria-hidden="true">
      <lucide-icon [img]="SparklesIcon" [size]="40"></lucide-icon>
    </div>
    <h2 class="hl__empty-heading">No habits yet</h2>
    <p class="hl__empty-body">
      Build better routines, one habit at a time.
    </p>
    <button type="button" class="hl__btn-primary" (click)="onCreateHabit()">
      <lucide-icon [img]="PlusIcon" [size]="18" aria-hidden="true"></lucide-icon>
      <span>Create your first habit</span>
    </button>
  </div>

</div>
