<div class="picker-backdrop" (click)="cancelDuration()"></div>
<div class="time-picker-modal">
  <div class="modal-header">
    <h3>Adjust Duration</h3>
    <button class="close-btn" (click)="cancelDuration()">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  
  <div class="drum-container">
    <div class="drum-highlight"></div>
    
    <!-- Hours Drum -->
    <div class="drum-col" (scroll)="onDrumScroll($event, 'hours')" (wheel)="onDrumWheel($event, 'hours')">
      <div class="drum-spacer"></div>
      @for (h of hoursList; track h) {
        <div class="drum-item" [class.selected]="editHours === h">{{ (h < 10 ? '0' : '') + h }}</div>
      }
      <div class="drum-spacer"></div>
    </div>
    <span class="colon">:</span>
    
    <!-- Minutes Drum -->
    <div class="drum-col" (scroll)="onDrumScroll($event, 'minutes')" (wheel)="onDrumWheel($event, 'minutes')">
      <div class="drum-spacer"></div>
      @for (m of minutesList; track m) {
        <div class="drum-item" [class.selected]="editMinutes === m">{{ (m < 10 ? '0' : '') + m }}</div>
      }
      <div class="drum-spacer"></div>
    </div>
    <span class="colon">:</span>

    <!-- Seconds Drum -->
    <div class="drum-col" (scroll)="onDrumScroll($event, 'seconds')" (wheel)="onDrumWheel($event, 'seconds')">
      <div class="drum-spacer"></div>
      @for (s of secondsList; track s) {
        <div class="drum-item" [class.selected]="editSeconds === s">{{ (s < 10 ? '0' : '') + s }}</div>
      }
      <div class="drum-spacer"></div>
    </div>
  </div>

  <div class="modal-actions">
    <button class="picker-btn save" (click)="saveDuration()">Save</button>
  </div>
</div>
