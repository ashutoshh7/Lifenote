<div class="timer-page">
  <!-- Discharge Flash Overlay -->
  @for (timer of timers$ | async; track timer.id) {
    @if (timer.discharged) {
      <div class="discharge-flash"></div>
    }
  }

  @for (timer of timers$ | async; track timer.id) {
    <div class="timer-shell">

      <!-- Session Type Selector -->
      <div class="type-pill">
        <span class="material-symbols-outlined" style="font-size: 16px;">edit</span>
        DEEP WORK
      </div>

      <div class="timer-name" style="display: none;"></div>

      <!-- Ring Timer -->
      <div class="omnitrix-watch-wrapper" 
           [class.warning]="timer.running && timer.minutes === 0 && timer.seconds <= 3"
           [class.running]="timer.running"
           [class.paused]="!timer.running && (timer.minutes !== 0 || timer.seconds !== 15)"
           (click)="timer.running ? stop(timer.id) : start(timer.id)">
        
        <!-- SPINNING DIAL CONTAINER -->
        <div class="watch-dial-spin">
          <!-- Outer Rotating Rim -->
          <div class="watch-outer-rim">
            <div class="rim-accents">
              <div class="rim-line rotate-0"></div>
              <div class="rim-line rotate-45"></div>
              <div class="rim-line rotate-90"></div>
              <div class="rim-line rotate-135"></div>
            </div>
            <!-- Technical Markings -->
            <div class="tech-mark top"></div>
            <div class="tech-mark bottom"></div>
          </div>

          <!-- Main Dial Plate -->
          <div class="watch-main-plate">
            <!-- Hourglass Inner Shape -->
            <div class="hourglass-inner">
              <div class="hourglass-glow"></div>
              <!-- Black Side Triangles -->
              <div class="hourglass-triangles">
                <div class="triangle-left"></div>
                <div class="triangle-right"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- FIXED TIME MODULE -->
        <div class="watch-fixed-core">
          <div class="core-content">
            <h1 class="core-time">{{ formatTime(timer) }}</h1>
            @if (timer.running) {
              <p class="core-label">FOCUS MODE</p>
            }
          </div>
          <!-- Internal Tech Ring -->
          <div class="core-tech-ring"></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="timer-controls">
        <button class="ctrl-btn ghost" (click)="reset(timer.id)" id="reset-btn" title="Reset">
          <span class="material-symbols-outlined">restart_alt</span>
        </button>

        <button class="ctrl-btn primary" (click)="start(timer.id)"
                id="play-btn" [class.playing]="timer.running">
          <span class="material-symbols-outlined">play_arrow</span>
        </button>

        <button class="ctrl-btn ghost" (click)="stop(timer.id)" title="Pause">
          <span class="material-symbols-outlined">pause</span>
        </button>
      </div>

      <p class="adjust-hint">Adjust Duration</p>

    </div>
  }

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon-box">
        <span class="material-symbols-outlined stat-icon">emoji_events</span>
      </div>
      <div class="stat-text">
        <span class="stat-label">TODAY'S FOCUS</span>
        <span class="stat-value">4.5 Hours</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-box">
        <span class="material-symbols-outlined stat-icon">trending_up</span>
      </div>
      <div class="stat-text">
        <span class="stat-label">CURRENT STREAK</span>
        <span class="stat-value">12 Days</span>
      </div>
    </div>
  </div>

</div>
