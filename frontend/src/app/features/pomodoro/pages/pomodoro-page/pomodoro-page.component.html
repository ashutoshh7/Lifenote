<div class="timer-page">

  @for (timer of timers$ | async; track timer.id) {
    <div class="timer-shell">

      <!-- Session Type Selector -->
      <div class="type-tabs">
        <button class="type-tab" [class.active]="timer.type === 'pomodoro'"
                (click)="setType(timer.id, 'pomodoro')" id="tab-focus">
          Deep Work
        </button>
        <button class="type-tab" [class.active]="timer.type === 'short-break'"
                (click)="setType(timer.id, 'short-break')" id="tab-short">
          Short Break
        </button>
        <button class="type-tab" [class.active]="timer.type === 'long-break'"
                (click)="setType(timer.id, 'long-break')" id="tab-long">
          Long Break
        </button>
      </div>

      <div class="timer-name" style="display: none;"></div>

      <!-- Ring Timer -->
      <div class="ring-wrapper">
        <svg class="ring-svg" viewBox="0 0 220 220" fill="none">
          <!-- Background ring -->
          <circle class="ring-track" cx="110" cy="110" r="95" stroke-width="6"/>
          <!-- Progress ring -->
          <circle class="ring-progress"
                  cx="110" cy="110" r="95" stroke-width="6"
                  [class.running]="timer.running"/>
        </svg>

        <div class="ring-content">
          <div class="ring-time" [class.running]="timer.running">{{ formatTime(timer) }}</div>
          <div class="ring-label">
            <span class="material-symbols-outlined" style="font-size: 14px; vertical-align: middle;">notifications</span>
            {{ timer.running ? 'Focus Mode On' : 'Ready to start' }}
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="timer-controls">
        <button class="ctrl-btn ghost" (click)="reset(timer.id)" id="reset-btn" title="Reset">
          <span class="material-symbols-outlined">restart_alt</span>
        </button>

        <button class="ctrl-btn primary" (click)="timer.running ? stop(timer.id) : start(timer.id)"
                id="play-pause-btn" [class.playing]="timer.running">
          <span class="material-symbols-outlined">{{ timer.running ? 'pause' : 'play_arrow' }}</span>
        </button>

        <button class="ctrl-btn ghost" title="Options">
          <span class="material-symbols-outlined">more_vert</span>
        </button>
      </div>

      <p class="adjust-hint">Adjust Duration</p>

    </div>
  }

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="material-symbols-outlined stat-icon">local_fire_department</span>
      <div class="stat-text">
        <span class="stat-value">4.5 hrs</span>
        <span class="stat-label">TODAY'S FOCUS</span>
      </div>
    </div>
    <div class="stat-card">
      <span class="material-symbols-outlined stat-icon">trending_up</span>
      <div class="stat-text">
        <span class="stat-value">12</span>
        <span class="stat-label">CURRENT STREAK</span>
      </div>
    </div>
    <div class="stat-card">
      <span class="material-symbols-outlined stat-icon">emoji_events</span>
      <div class="stat-text">
        <span class="stat-value">48</span>
        <span class="stat-label">TOTAL SESSIONS</span>
      </div>
    </div>
  </div>

</div>
