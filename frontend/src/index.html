<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="utf-8">
  <title>Momentum — Premium Productivity</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Momentum — Premium Productivity. Notes, Goals, and Focus Sessions in one place.">

  <!-- Momentum Design System Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Hanken+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet" crossorigin="anonymous">

  <!-- Material Symbols (for icons) -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" crossorigin="anonymous">

  <!-- Prism syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" crossorigin="anonymous">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #131313;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #app-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #app-splash .splash-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      animation: splash-pulse 1.8s ease-in-out infinite;
    }
    #app-splash .splash-name {
      font-family: 'Hanken Grotesk', 'Inter', 'Segoe UI', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #e2e2e2;
      letter-spacing: -0.3px;
    }
    #app-splash .splash-spinner {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(83, 224, 118, 0.2);
      border-top-color: #53e076;
      border-radius: 50%;
      animation: splash-spin 0.8s linear infinite;
      margin-top: 4px;
    }
    @keyframes splash-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(83, 224, 118, 0); }
      50% { box-shadow: 0 0 0 8px rgba(83, 224, 118, 0); border-color: rgba(83, 224, 118, 0.45); }
    }
    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Splash screen: shown instantly, hidden once Angular bootstraps -->
  <div id="app-splash">
    <img class="splash-logo" src="web-app-manifest-192x192.png" alt="Momentum">
    <span class="splash-name">Momentum</span>
    <div class="splash-spinner"></div>
  </div>

  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
