<script>
        let isPinned = false;
        let isColorPickerOpen = false;
        let isImageVisible = false;

        function togglePin() {
            isPinned = !isPinned;
            const icon = document.getElementById('pin-icon');
            if (isPinned) {
                icon.style.fontVariationSettings = "'FILL' 1";
                icon.classList.remove('text-on-surface-variant');
                icon.classList.add('text-primary');
            } else {
                icon.style.fontVariationSettings = "'FILL' 0";
                icon.classList.add('text-on-surface-variant');
                icon.classList.remove('text-primary');
            }
        }

        function toggleColorPicker() {
            const picker = document.getElementById('color-picker');
            isColorPickerOpen = !isColorPickerOpen;
            picker.classList.toggle('hidden', !isColorPickerOpen);
            picker.classList.toggle('flex', isColorPickerOpen);
        }

        function toggleImage() {
            const imgContainer = document.getElementById('image-container');
            isImageVisible = !isImageVisible;
            imgContainer.classList.toggle('hidden', !isImageVisible);
            imgContainer.classList.toggle('relative', isImageVisible);
        }

        function removeImage() {
            isImageVisible = false;
            document.getElementById('image-container').classList.add('hidden');
            document.getElementById('image-container').classList.remove('relative');
        }

        function changeBg(colorClass) {
            const container = document.getElementById('editor-container');
            const body = document.body;
            
            // Clear previous bg classes
            const bgClasses = ['bg-surface', 'bg-secondary-container', 'bg-tertiary-container', 'bg-primary-container', 'bg-error-container'];
            bgClasses.forEach(cls => {
                container.classList.remove(cls);
                body.classList.remove(cls);
            });
            
            // If it's the base surface, we keep it standard noir
            if (colorClass === 'bg-surface') {
                container.classList.add('bg-transparent');
                body.classList.add('bg-background');
            } else {
                container.classList.add(colorClass);
                container.classList.add('rounded-2xl');
                container.classList.add('mt-4');
                container.classList.add('p-6');
                container.classList.add('glass-panel');
            }

            // Update rings on picker
            const buttons = document.querySelectorAll('#color-picker button');
            buttons.forEach(btn => btn.classList.remove('ring-2', 'ring-primary', 'ring-offset-2', 'ring-offset-background'));
            event.currentTarget.classList.add('ring-2', 'ring-primary', 'ring-offset-2', 'ring-offset-background');
        }

        // Simple active state logic for the navigation "mock"
        // This is an edit screen, so technically it's focused on the "Notes" context
        // but since it's a sub-page, the Global Nav is suppressed as per the mandate.
    </script>
