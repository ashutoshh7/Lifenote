<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Milestone</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500&amp;family=Geist:wght@500&amp;display=swap" rel="stylesheet"/>

  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "error-container": "#93000a",
                "on-tertiary-fixed-variant": "#004c69",

                "surface-dim": "#131313",
                "on-secondary-container": "#d1a1ff",
                "on-tertiary-fixed": "#001e2c",
                "error": "#ffb4ab",
                "tertiary-container": "#16ade7",
                "surface-container-highest": "#353534",
                "surface": "#131313",
                "outline-variant": "#3d4a3d",
                "primary-container": "#1db954",
                "secondary-fixed-dim": "#ddb8ff",
                "tertiary": "#7bd0ff",
                "surface-bright": "#393939",
                "surface-container-lowest": "#0e0e0e",
                "primary": "#53e076",
                "outline": "#869585",
                "surface-variant": "#353534",
                "on-background": "#e5e2e1",
                "tertiary-fixed-dim": "#7bd0ff",
                "surface-container": "#201f1f",
                "surface-container-low": "#1c1b1b",
                "on-primary-container": "#004118",
                "tertiary-fixed": "#c4e7ff",
                "on-secondary": "#490081",
                "on-primary-fixed": "#002108",
                "background": "#131313",
                "primary-fixed": "#72fe8f",
                "on-surface-variant": "#bccbb9",
                "secondary-fixed": "#f0dbff",
                "inverse-surface": "#e5e2e1",
                "inverse-on-surface": "#313030",
                "primary-fixed-dim": "#53e076",
                "on-secondary-fixed": "#2c0051",
                "on-tertiary-container": "#003d54",
                "on-secondary-fixed-variant": "#62259b",
                "surface-tint": "#53e076",
                "on-tertiary": "#00354a",
                "inverse-primary": "#006e2d",
                "on-primary-fixed-variant": "#005320",
                "on-surface": "#e5e2e1",
                "on-primary": "#003914",
                "secondary-container": "#62259b",
                "cyber-cobalt": "#3D5AFE"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "gutter": "1.5rem",
                "base": "8px",
                "container-padding-desktop": "2.5rem",
                "container-padding-mobile": "1rem",
                "stack-gap": "1rem"
        },
        "fontFamily": {
                "body-sm": [
                        "Inter"
                ],
                "headline-lg-mobile": [
                        "Hanken Grotesk"
                ],
                "label-md": [

                ],
                "headline-lg": [
                        "Hanken Grotesk"
                ],
                "body-md": [

                ],

        },
        "fontSize": {

                "body-md": [

                        {

                        }

                "display-lg": [

                                "letterSpacing": "-0.02em",

},
    },
  }

<style>
    body { background-color: #000000; color: theme('colors.on-background'); }
    .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
    .input-glow:focus { border-color: theme('colors.primary'); box-shadow: 0 0 0 1px theme('colors.primary'); outline: none; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; cursor: pointer; }
    ::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="antialiased min-h-screen flex flex-col md:hidden bg-black text-on-surface">
<!-- TopAppBar -->
<header class="dark:bg-black/80 backdrop-blur-3xl fixed top-0 w-full z-50 flex justify-between items-center px-container-padding-mobile h-16 border-b border-white/5">
<button class="text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-200 flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Add Milestone</h1>
<button class="bg-cyber-cobalt text-white px-5 py-1.5 rounded-full font-label-md text-label-md hover:opacity-90 transition-opacity shadow-[0_0_15px_rgba(61,90,254,0.5)] active:scale-95 duration-200">
        Save
    </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-28 px-container-padding-mobile flex flex-col gap-stack-gap">
<!-- Milestone Title -->
<div class="glass-panel rounded-2xl p-5">
<div class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-primary text-sm">edit_note</span>
<label class="block font-label-md text-label-md text-primary uppercase tracking-wider" for="milestone-title">Milestone Title</label>
</div>
<input class="w-full border border-white/20 rounded-xl px-4 py-3.5 font-body-md text-body-md text-white placeholder:text-on-surface-variant/50 input-glow transition-all duration-200 bg-black/60 focus:bg-black/80" id="milestone-title" placeholder="e.g., Phase 1 Completion" type="text"/>
</div>
<!-- Target Date -->
<div class="glass-panel rounded-2xl p-5">
<div class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-primary text-sm">event</span>
<label class="block font-label-md text-label-md text-primary uppercase tracking-wider" for="milestone-date">Target Date</label>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary" style='font-variation-settings: "FILL" 1;'>calendar_today</span>
</div>
<input class="w-full pl-12 border border-white/20 rounded-xl pr-4 py-3.5 font-body-md text-body-md text-white placeholder:text-on-surface-variant/50 input-glow transition-all duration-200 bg-black/60 focus:bg-black/80 block appearance-none" id="milestone-date" type="date"/>
</div>
</div>
<!-- Description -->
<div class="glass-panel rounded-2xl p-5">
<div class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-primary text-sm">subject</span>
<label class="block font-label-md text-label-md text-primary uppercase tracking-wider" for="milestone-desc">Description <span class="text-on-surface-variant opacity-50 normal-case">(Optional)</span></label>
</div>
<textarea class="w-full border border-white/20 rounded-xl px-4 py-3.5 font-body-md text-body-md text-white placeholder:text-on-surface-variant/50 input-glow transition-all duration-200 resize-none bg-black/60 focus:bg-black/80" id="milestone-desc" placeholder="Add details about this milestone..." rows="4"></textarea>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full bg-black/90 backdrop-blur-xl border-t border-white/10 flex justify-around items-center h-20 px-4 z-50 pb-safe">
<button class="flex flex-col items-center justify-center w-16 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined mb-1 text-2xl">notes</span>
<span class="text-[10px] font-medium tracking-wide">Notes</span>
</button>
<button class="flex flex-col items-center justify-center w-16 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined mb-1 text-2xl">timer</span>
<span class="text-[10px] font-medium tracking-wide">Timer</span>
</button>
<button class="flex flex-col items-center justify-center w-16 text-primary transition-colors">
<span class="material-symbols-outlined mb-1 text-2xl" style='font-variation-settings: "FILL" 1;'>flag</span>
<span class="text-[10px] font-medium tracking-wide">Goals</span>
</button>
</nav>
</body></html>
