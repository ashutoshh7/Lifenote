<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Since it's a modal over a dashboard */
        }
        
        /* Modal Glass Effect */
        .glass-panel {
            background: rgba(40, 40, 40, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Base Input Reset for Minimalist Style */
        .minimal-input {
            background: transparent !important;
            border: none;
            border-bottom: 2px solid theme('colors.surface-container-high');
            border-radius: 0;
            padding: 12px 0;
            color: theme('colors.on-surface');
            outline: none;
            box-shadow: none !important;
            transition: border-color 0.3s ease;
            width: 100%;
        }

        .minimal-input:focus {
            border-bottom-color: theme('colors.primary');
        }

        .minimal-input::placeholder {
            color: theme('colors.on-surface-variant');
            opacity: 0.5;
        }

        /* Hidden scrollbar for textareas */
        textarea::-webkit-scrollbar {
            display: none;
        }
        textarea {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="flex h-screen w-screen bg-background">
<!-- Fake Background Context (Dashboard) to show the modal overlay -->
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBVX9oJxantopuXEbGs5EkL9LibPY9D4_uQkGIiWMTTVadgP6qFPuAa5jqLlxuSf7RaUK-1p5QOHquKy-SdZaMiqLC0VhZ4P5hKLO0encHBPbWT3bQI0HBvFnBFf121Z5fLXKDNDQvfeIu-v7x1_Nk7e4v41FmEZ4B4JVNeJiK80-e1eurPepBn8tlJt7q7A-2ZHzP1spAnAqHjgEw73SGW2i_1pLCe9NIuveCWaUmnKAMa0IGN4ouOQVsddKQuHGlzcYrR8UBBSlOF'); background-size: cover; filter: blur(10px);"></div>
<div class="fixed inset-0 z-0 bg-background/80 pointer-events-none"></div>
<!-- Modal Overlay Container -->
<div class="relative z-50 flex items-center justify-center w-full h-full p-container-padding-desktop">
<!-- Add/Edit Milestone Panel -->
<main class="glass-panel w-full max-w-2xl rounded-xl overflow-hidden flex flex-col transform transition-all duration-300 scale-100">
<!-- Header -->
<header class="flex items-center justify-between p-stack-lg border-b border-white/5">
<div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Add Milestone</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-unit">Break down your goal into actionable steps.</p>
</div>
<button aria-label="Close Modal" class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full hover:bg-white/5">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</header>
<!-- Form Content -->
<div class="flex-1 p-stack-lg space-y-stack-xl overflow-y-auto">
<!-- Title Input -->
<div class="space-y-stack-sm relative group">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block" for="milestone-title">Milestone Title</label>
<input class="minimal-input font-body-lg text-body-lg" id="milestone-title" placeholder="e.g., Complete MVP Wireframes" type="text"/>
</div>
<!-- Date Input -->
<div class="space-y-stack-sm relative group">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block" for="target-date">Target Date</label>
<div class="relative">
<input class="minimal-input font-body-lg text-body-lg appearance-none bg-transparent" id="target-date" type="date"/>
<!-- Custom icon to hide default browser date picker icon if possible, though native date inputs are tricky to fully style across browsers without a custom JS widget. This relies on the minimal-input styling. -->
</div>
</div>
<!-- Description Textarea -->
<div class="space-y-stack-sm relative group">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block" for="description">Description (Optional)</label>
<textarea class="minimal-input font-body-lg text-body-lg resize-none" id="description" placeholder="Add any details, links, or notes for this milestone..." rows="3"></textarea>
</div>
</div>
<!-- Footer Actions -->
<footer class="p-stack-lg bg-surface-container-low/50 border-t border-white/5 flex items-center justify-end space-x-gutter">
<button class="px-6 py-3 rounded-full font-label-md text-label-md text-on-surface hover:text-primary transition-colors focus:outline-none focus:ring-1 focus:ring-primary/20">
                    Cancel
                </button>
<button class="px-8 py-3 rounded-full bg-primary text-on-primary-fixed font-label-md text-label-md hover:bg-primary-fixed transition-colors shadow-[0_0_15px_rgba(83,224,118,0.2)] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background">
                    Save Milestone
                </button>
</footer>
</main>
</div>
</body></html>
