<style>
        .glass-panel {
            background: rgba(18, 18, 18, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .timer-ring-container {
            position: relative;
            width: 380px;
            height: 380px;
        }
        
        .timer-ring-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }
        
        .timer-ring-bg {
            fill: none;
            stroke: #1f1f1f; /* surface-container */
            stroke-width: 8;
        }
        
        .timer-ring-progress {
            fill: none;
            stroke: #1db954; /* Momentum Green / primary-container */
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 1000; /* Approximate circumference */
            stroke-dashoffset: 200; /* 80% progress */
            filter: drop-shadow(0 0 12px rgba(29, 185, 84, 0.4));
            transition: stroke-dashoffset 1s linear;
        }
        
        .timer-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(29, 185, 84, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-black text-on-surface min-h-screen flex overflow-hidden font-body-md">

</div>
<div>
<h1 class="text-headline-md font-headline-md text-primary tracking-tight">Momentum</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant opacity-70">Premium Productivity</p>
</div>
</div>
<!-- Navigation Links -->
<div class="flex flex-col gap-2 flex-grow">

<span class="material-symbols-outlined text-[20px] group-hover:text-on-surface transition-colors">dashboard</span>

<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant font-medium hover:bg-surface-container-high hover:text-on-surface transition-colors active:scale-[0.98] duration-150 ease-in-out group" href="#">
<span class="material-symbols-outlined text-[20px] group-hover:text-on-surface transition-colors">description</span>

<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant font-medium hover:bg-surface-container-high hover:text-on-surface transition-colors active:scale-[0.98] duration-150 ease-in-out group" href="#">

<!-- Main Content Area -->
<main class="ml-64 flex-1 flex flex-col h-screen overflow-y-auto bg-black relative">
<div class="flex-1 w-full max-w-[1440px] mx-auto p-container-padding-desktop grid grid-cols-12 gap-gutter relative z-10 h-full">
<!-- Left Column: Timer (Takes up more space) -->

<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary-container/15 rounded-full blur-[150px] pointer-events-none"></div>
<!-- Session Indicator -->
<div class="glass-panel px-6 py-2 rounded-full flex items-center gap-2 mb-12 animate-pulse-slow relative z-10">
<div class="w-2 h-2 rounded-full bg-primary-container shadow-[0_0_8px_rgba(29,185,84,0.8)]"></div>

</div>
<!-- Timer Display -->
<div class="timer-ring-container mb-12 relative z-10">
<div class="timer-glow"></div>
<svg class="timer-ring-svg absolute inset-0 z-10" viewBox="0 0 340 340">
<circle class="timer-ring-bg" cx="170" cy="170" r="160"></circle>
<circle class="timer-ring-progress" cx="170" cy="170" r="160"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center z-20">
<h2 class="text-[84px] font-bold tracking-tighter text-white leading-none mb-2" style="font-feature-settings: 'tnum' on, 'lnum' on;">25:00</h2>
<p class="font-label-md text-label-md text-on-surface-variant tracking-wider">REMAINING</p>
</div>
</div>

<button class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-on-surface hover:bg-surface-container transition-all hover:scale-105 group border border-white/10">

</button>
<button class="w-20 h-20 rounded-full bg-primary-container flex items-center justify-center text-black hover:bg-primary transition-all hover:scale-105 shadow-[0_0_30px_rgba(29,185,84,0.3)] border border-primary-fixed">

</button>
<button class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-on-surface hover:bg-surface-container transition-all hover:scale-105 group border border-white/10">

<p class="font-body-md text-body-md text-on-surface-variant">Your productivity overview</p>
</div>
<!-- Bento Grid for Stats -->

  </div>

  </div>
</div>

<!-- Current Streak Card -->
<div class="bg-surface-container-low/40 backdrop-blur-xl border border-white/5 rounded-2xl p-6 flex flex-col gap-4">
  <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center shadow-[0_0_15px_rgba(29,185,84,0.1)]">
    <span class="material-symbols-outlined text-primary text-[20px]">local_fire_department</span>
  </div>
  <div class="flex flex-col">
    <span class="text-on-surface-variant text-xs font-medium uppercase tracking-wider">Current Streak</span>
    <div class="flex items-baseline gap-1">
      <span class="text-on-surface text-2xl font-bold">12</span>
      <span class="text-on-surface-variant text-sm font-medium">days</span>
    </div>
  </div>
</div></div>

<style>
        /* Lightweight custom scrollbar for the history list */

            width: 4px;
